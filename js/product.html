<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفاصيل المنتج - Misar Systems</title>
    <meta name="theme-color" content="#1a237e">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/XktM4crn/1767120438295.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="status-bar"></div>
    <div class="loading" id="loadingScreen" style="display:none;"><div class="loading-spinner"></div><p>جاري التحميل...</p></div>

    <!-- شاشة تفاصيل المنتج فقط -->
    <div class="screen active" id="productDetailScreen">
        <div class="app-header"><div class="header-content"><div class="header-left"><button class="back-btn active" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><div class="header-title">تفاصيل المنتج</div></div><div class="header-actions"><button class="header-icon" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i></button></div></div></div>
        <div class="products-section" style="padding-top:20px;"><div id="productDetailContent"><p style="text-align:center; padding:50px;">جاري تحميل بيانات المنتج...</p></div></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner-large"></div></div>
</div>

<script src="js/supabase.js"></script>
<script src="js/products.js"></script>
<script src="js/product.js"></script>
<script src="js/cart.js"></script>
<script>
    // عند تحميل الصفحة، نأخذ معرف المنتج من الـ URL
    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        if (!productId) {
            document.getElementById('productDetailContent').innerHTML = '<p style="text-align:center; padding:50px;">لم يتم تحديد منتج</p>';
            return;
        }
        // تحميل المنتجات إذا لم تكن محملة
        if (appState.products.length === 0) {
            await loadProductsFromDB();
        }
        const product = appState.products.find(p => p.id === productId);
        if (product) {
            openProductDetail(product);
        } else {
            document.getElementById('productDetailContent').innerHTML = '<p style="text-align:center; padding:50px;">المنتج غير موجود</p>';
        }
    });
</script>
</body>
</html>
